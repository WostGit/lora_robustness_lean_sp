name: Artifact CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reviewer-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Lean and Lake
        run: |
          set -euo pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          python3 --version
          ~/.elan/bin/lean --version
          ~/.elan/bin/lake --version

      - name: Run reviewer quickstart
        run: bash scripts/reviewer_quickstart.sh

      - name: Run Lean build and capture log
        run: |
          mkdir -p logs
          {
            echo "# Lean build status"
            echo
            date -u +"UTC timestamp: %Y-%m-%dT%H:%M:%SZ"
            echo
            echo "lean version: $(lean --version)"
            echo "lake version: $(lake --version)"
            echo
            echo "Running lake build..."
            lake build
            echo
            echo "lake build completed successfully"
          } | tee logs/lean_build_status.md

      - name: Write CI summary
        if: always()
        run: |
          mkdir -p logs
          {
            echo "# Artifact CI summary"
            echo
            date -u +"UTC timestamp: %Y-%m-%dT%H:%M:%SZ"
            echo
            echo "## Commands run"
            echo
            echo '```bash'
            echo 'bash scripts/reviewer_quickstart.sh'
            echo 'lake build'
            echo '```'
            echo
            echo "## Generated outputs"
            echo
            if [ -f logs/toy_lora_privacy_results.csv ]; then
              echo "- logs/toy_lora_privacy_results.csv: $(wc -l < logs/toy_lora_privacy_results.csv) lines including header"
              echo
              echo "First five lines:"
              echo '```csv'
              head -n 5 logs/toy_lora_privacy_results.csv
              echo '```'
            else
              echo "- toy results CSV missing"
            fi
            echo
            if [ -f logs/lean_build_status.md ]; then
              echo "- logs/lean_build_status.md generated"
            fi
          } > logs/ci_summary.md

      - name: Commit generated result logs back to main
        if: github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'ci: update generated artifact results [skip ci]'
          file_pattern: 'logs/*.csv logs/*.md'
